<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Chủ - Hệ Thống Quản Lý Lab VLU</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- FullCalendar -->
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js'></script>
    <style>
        :root {
            --vlu-red: #e31b23;
            --vlu-red-dark: #b3151b;
            --sidebar-bg: #1e293b;
            --sidebar-hover: #334155;
            --bg-light: #f8fafc;
            --card-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --sidebar-width: 260px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            color: #1e293b;
            overflow-x: hidden;
        }

        /* Sidebar Styling */
        #sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--sidebar-bg);
            color: #f8fafc;
            position: fixed;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1050;
            display: flex;
            flex-direction: column;
        }

        #sidebar.collapsed {
            margin-left: calc(-1 * var(--sidebar-width));
        }

        .sidebar-header {
            padding: 2rem 1.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .sidebar-header h4 {
            margin-bottom: 0;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #fff;
        }

        .sidebar-nav {
            padding: 1.5rem 0.75rem;
            flex-grow: 1;
        }

        .nav-link {
            display: flex;
            align-items: center;
            padding: 0.875rem 1rem;
            color: #94a3b8;
            border-radius: 0.5rem;
            margin-bottom: 0.25rem;
            transition: all 0.2s;
            font-weight: 500;
            text-decoration: none;
        }

        .nav-link i {
            width: 1.5rem;
            margin-right: 0.75rem;
            font-size: 1.1rem;
        }

        .nav-link:hover {
            background: var(--sidebar-hover);
            color: #fff;
        }

        .nav-link.active {
            background: var(--vlu-red);
            color: #fff;
        }

        /* Content Area Styling */
        #content {
            margin-left: var(--sidebar-width);
            padding: 2rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            min-height: 100vh;
        }

        #content.expanded {
            margin-left: 0;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        #toggle-sidebar {
            background: #fff;
            border: 1px solid #e2e8f0;
            color: #64748b;
            padding: 0.5rem 0.75rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .section-card {
            background: #fff;
            border-radius: 1rem;
            padding: 1.5rem;
            box-shadow: var(--card-shadow);
            border: none;
            height: 100%;
        }

        /* FullCalendar Customization */
        .fc {
            font-family: inherit;
            background: #fff;
            padding: 1rem;
            border-radius: 0.5rem;
        }
        .fc .fc-toolbar-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--sidebar-bg);
        }
        .fc .fc-button-primary {
            background-color: var(--vlu-red);
            border-color: var(--vlu-red);
            text-transform: capitalize;
            font-weight: 600;
        }
        .fc .fc-button-primary:hover {
            background-color: var(--vlu-red-dark);
            border-color: var(--vlu-red-dark);
        }
        .fc .fc-event {
            padding: 2px 5px;
            font-size: 0.85rem;
            border: none;
            margin-bottom: 2px;
            cursor: default; /* Không cho thấy bàn tay vì đã tắt click */
        }
        .fc .fc-daygrid-day-number {
            text-decoration: none;
            color: #64748b;
            font-weight: 600;
            padding: 8px;
        }

        /* Lab Selector */
        .lab-filter-box {
            background: #fff;
            padding: 1rem 1.5rem;
            border-radius: 1rem;
            box-shadow: var(--card-shadow);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        #labSelect {
            max-width: 300px;
            font-weight: 600;
            border-radius: 0.5rem;
            border: 2px solid #e2e8f0;
        }

        @media (max-width: 991.98px) {
            #sidebar { margin-left: calc(-1 * var(--sidebar-width)); }
            #sidebar.active { margin-left: 0; }
            #content { margin-left: 0; }
        }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <nav id="sidebar">
        <div class="sidebar-header text-center">
            <img src="https://vuainnhanh.com/wp-content/uploads/2023/02/logo-van-lang-896x1024-1-1200x1371.png" alt="VLU Logo" class="img-fluid mb-3" style="max-height: 80px; filter: drop-shadow(0 0 5px rgba(255,255,255,0.2));">
            <h5 class="fw-bold text-white mb-0">LAB MANAGEMENT</h5>
            <span class="badge bg-danger mt-2">Information Portal</span>
        </div>
        <div class="sidebar-nav">
            <a href="/" class="nav-link active"><i class="fas fa-house"></i> Trang Chủ</a>
            <a href="/booking/" class="nav-link"><i class="fas fa-calendar-check"></i> Đăng Ký Sử Dụng</a>
            <a href="/history/" class="nav-link"><i class="fas fa-history"></i> Lịch Sử Sử Dụng</a>
            <hr class="text-white-50">
            <a href="#" class="nav-link" data-bs-toggle="modal" data-bs-target="#hygieneModal"><i class="fas fa-broom"></i> Báo Cáo Vệ Sinh</a>
        </div>
        </nav>

        <!-- Main Content -->
        <div id="content">
        <!-- Top Bar -->
        <div class="top-bar">
            <div class="d-flex align-items-center">
                <button id="toggle-sidebar" class="me-3"><i class="fas fa-bars"></i></button>
                <img src="https://vuainnhanh.com/wp-content/uploads/2023/02/logo-van-lang-896x1024-1-1200x1371.png" alt="VLU" class="me-3 d-none d-md-block" style="height: 30px;">
                <h4 class="mb-0 fw-bold text-dark">Lịch Trình & Chỗ Trống</h4>
            </div>
            <div class="user-info">
                <a href="/booking/" class="btn btn-danger fw-bold shadow-sm rounded-pill px-4">
                    <i class="fas fa-paper-plane me-2"></i> ĐĂNG KÝ SỬ DỤNG
                </a>
            </div>
        </div>

        <div class="container-fluid">
            <!-- Lab Filter -->
            <div class="lab-filter-box">
                <div class="d-flex align-items-center">
                    <i class="fas fa-filter text-muted me-2"></i>
                    <span class="fw-bold text-secondary me-3 text-uppercase small">Phòng Lab:</span>
                    <select id="labSelect" class="form-select shadow-none"></select>
                </div>
                <div class="d-none d-md-flex gap-4">
                    <span class="small fw-medium"><i class="fas fa-circle text-success me-1"></i> Còn nhiều chỗ</span>
                    <span class="small fw-medium"><i class="fas fa-circle text-warning me-1"></i> Sắp hết chỗ</span>
                    <span class="small fw-medium"><i class="fas fa-circle text-danger me-1"></i> Đã đầy</span>
                </div>
            </div>

            <!-- Calendar Section -->
            <div class="section-card">
                <div id="calendar"></div>
            </div>
        </div>
    </div>

    <!-- Hygiene Modal -->
    <div class="modal fade" id="hygieneModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header bg-danger text-white border-0 py-3">
                    <h5 class="modal-title fw-bold"><i class="fas fa-broom me-2"></i> BÁO CÁO VỆ SINH & SỰ CỐ</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="hygieneForm">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Phòng Lab</label>
                            <select id="hygLab" name="lab_id" class="form-select bg-light border-0" required></select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Người báo cáo</label>
                            <input type="text" name="reporter" class="form-control bg-light border-0" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Tình trạng</label>
                            <select name="status" class="form-select bg-light border-0">
                                <option value="SẠCH">✨ Sạch sẽ</option>
                                <option value="BẨN">⚠️ Cần dọn dẹp</option>
                                <option value="HỎNG">❌ Thiết bị hư hỏng</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-danger w-100 py-2 fw-bold">GỬI BÁO CÁO</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const sidebar = document.getElementById('sidebar');
            const content = document.getElementById('content');
            const toggleBtn = document.getElementById('toggle-sidebar');
            const labSelect = document.getElementById('labSelect');
            let calendar;

            toggleBtn.onclick = () => {
                if (window.innerWidth > 991.98) {
                    sidebar.classList.toggle('collapsed');
                    content.classList.toggle('expanded');
                } else {
                    sidebar.classList.toggle('active');
                }
            };

            const initCalendar = () => {
                if (calendar) calendar.destroy();
                calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                    initialView: 'dayGridMonth',
                    locale: 'vi',
                    height: 'auto',
                    headerToolbar: {
                        left: 'prev,next today',
                        center: 'title',
                        right: 'dayGridMonth,listMonth'
                    },
                    events: {
                        url: '/api/bookings/events/',
                        extraParams: () => ({ lab_id: labSelect.value })
                    },
                    // Đã tắt eventClick (vô hiệu hóa đặt máy từ lịch)
                });
                calendar.render();
            };

            fetch('/api/labs/').then(async res => {
                const labs = await res.json();
                const hygLab = document.getElementById('hygLab');
                
                if (labs.error || !Array.isArray(labs)) {
                    labSelect.innerHTML = `<option value="" disabled selected>${labs.error || 'Lỗi tải dữ liệu'}</option>`;
                    return;
                }

                labSelect.innerHTML = '';
                labs.forEach(l => {
                    const opt = `<option value="${l.id || l.ID}">${l.name || l.Name}</option>`;
                    labSelect.innerHTML += opt;
                    if (hygLab) hygLab.innerHTML += opt;
                });
                initCalendar();
            }).catch(err => {
                console.error("Fetch error:", err);
                labSelect.innerHTML = '<option value="" disabled selected>Lỗi kết nối!</option>';
            });

            labSelect.onchange = () => calendar.refetchEvents();

            // Tự động tải lịch sử và lắng nghe thay đổi
            // (Đã chuyển sang trang /history/ riêng biệt)

            document.getElementById('hygieneForm').onsubmit = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const labName = labSelect.options[labSelect.selectedIndex].text;
                formData.append('lab_name', labName);
                formData.append('report_time', new Date().toISOString());

                const res = await fetch('/api/hygiene/report/', { method: 'POST', body: formData });
                const result = await res.json();
                if (result.status === 'success') {
                    alert("Đã gửi báo cáo!");
                    bootstrap.Modal.getInstance(document.getElementById('hygieneModal')).hide();
                }
            };
        });
    </script>
</body>
</html>
