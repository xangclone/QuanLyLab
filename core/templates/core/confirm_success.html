<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác nhận đăng ký - Lab Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f8fafc; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: 'Inter', sans-serif; }
        .confirm-card { background: #fff; padding: 3rem; border-radius: 1.5rem; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; max-width: 500px; }
        .icon-box { width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; font-size: 2.5rem; }
        .icon-success { background: #dcfce7; color: #16a34a; }
        .icon-error { background: #fee2e2; color: #dc2626; }
        .icon-warning { background: #fef3c7; color: #d97706; }
    </style>
</head>
<body>
    <div class="confirm-card">
        {% if status == 'success' %}
            <div class="icon-box icon-success"><i class="fas fa-check-circle"></i></div>
        {% elif status == 'error' %}
            <div class="icon-box icon-error"><i class="fas fa-times-circle"></i></div>
        {% else %}
            <div class="icon-box icon-warning"><i class="fas fa-exclamation-circle"></i></div>
        {% endif %}
        
        <h3 class="fw-bold mb-3">Thông báo xác nhận</h3>
        <p class="text-muted mb-4">{{ message }}</p>
        
        {% if link %}
            <a href="{{ link }}" target="_blank" class="btn btn-danger w-100 rounded-pill py-2 fw-bold">
                <i class="fab fa-google me-2"></i> XEM TRÊN GOOGLE CALENDAR
            </a>
        {% endif %}
        
        <a href="/" class="btn btn-link mt-3 text-decoration-none text-muted">Quay lại trang chủ</a>
    </div>
</body>
</html>
